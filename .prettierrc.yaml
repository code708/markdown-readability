# Prettier v3 - all options explicit
printWidth: 80
tabWidth: 2
useTabs: true
semi: true
singleQuote: true
quoteProps: 'as-needed'
jsxSingleQuote: false
trailingComma: 'all'
bracketSpacing: true
bracketSameLine: false
arrowParens: 'always'
proseWrap: preserve
htmlWhitespaceSensitivity: 'css'
endOfLine: 'lf'
embeddedLanguageFormatting: 'auto'
singleAttributePerLine: false
